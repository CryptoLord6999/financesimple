<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Minimal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #09090b;
            color: #fafafa;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .input-premium {
            background: transparent;
            border: none;
            border-bottom: 1px solid #3f3f46;
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .input-premium:focus {
            border-bottom-color: #a1a1aa;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        .transaction-item {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reset-btn {
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }
        .reset-btn:hover {
            opacity: 0.7;
        }
        .sync-indicator {
            font-size: 0.75rem;
            color: #71717a;
            margin-top: 0.5rem;
            text-align: center;
        }
        .sync-indicator.syncing {
            color: #3b82f6;
        }
        .sync-indicator.synced {
            color: #10b981;
        }
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-card {
            flex: 1;
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 0.75rem;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #a1a1aa;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 0.25rem;
        }
        .income-color {
            color: #10b981;
        }
        .expense-color {
            color: #ef4444;
        }
        .revenue-color {
            color: #f59e0b;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }
        .modal.active {
            display: flex;
            align-items: flex-end;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            width: 100%;
            background: rgba(24, 24, 27, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem 2rem 0 0;
            padding: 2rem 1.5rem 3rem;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-close {
            width: 2.5rem;
            height: 0.3rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0.15rem;
            margin: 0 auto 1rem;
        }
        .report-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .report-label {
            font-size: 0.85rem;
            color: #a1a1aa;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .report-value {
            font-size: 1.75rem;
            font-weight: 700;
        }
        .report-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <!-- Баланс -->
    <div class="flex-1 flex flex-col justify-center items-center mb-8">
        <p class="text-zinc-500 text-sm font-medium tracking-widest uppercase mb-2">Текущий баланс</p>
        <h1 id="balance" class="text-6xl font-extralight tracking-tight text-white">0 ₽</h1>
        <div id="syncStatus" class="sync-indicator">подключение...</div>
        
        <!-- Статистика -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Доход</div>
                <div class="stat-value income-color" id="totalIncome">0 ₽</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Расход</div>
                <div class="stat-value expense-color" id="totalExpense">0 ₽</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Выручка</div>
                <div class="stat-value revenue-color" id="totalRevenue">0 ₽</div>
            </div>
        </div>

        <!-- Кнопка отчета -->
        <button onclick="openReport()" class="mt-6 px-6 py-2 bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 active:scale-95 transition-all duration-200 rounded-2xl font-medium text-sm">
            📊 Посмотреть отчет
        </button>
    </div>

    <!-- Ввод -->
    <div class="glass-card rounded-3xl p-6 mb-6">
        <input type="number" id="amount" placeholder="0" class="input-premium w-full mb-6" inputmode="decimal">
        
        <div class="grid grid-cols-2 gap-4">
            <button onclick="addTransaction('income')" class="bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20 active:scale-95 transition-all duration-200 rounded-2xl py-4 font-medium text-lg">
                + Доход
            </button>
            <button onclick="addTransaction('expense')" class="bg-rose-500/10 text-rose-400 hover:bg-rose-500/20 active:scale-95 transition-all duration-200 rounded-2xl py-4 font-medium text-lg">
                − Расход
            </button>
        </div>
    </div>

    <!-- История -->
    <div class="flex-1 overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <p class="text-zinc-500 text-xs font-medium tracking-widest uppercase">История операций</p>
            <button id="resetBtn" onclick="resetAll()" class="reset-btn text-zinc-600 text-xs font-medium tracking-widest uppercase hover:text-rose-400 transition-colors">
                Обнулить
            </button>
        </div>
        <div id="history" class="space-y-3 pb-6">
            <!-- Сюда добавляются транзакции -->
        </div>
    </div>

    <!-- Модальное окно отчета -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-close"></div>
            
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Финансовый отчет</h2>
            
            <!-- Основные показатели -->
            <div class="report-item">
                <div class="report-label">Текущий баланс</div>
                <div class="report-value text-white" id="reportBalance">0 ₽</div>
            </div>

            <div class="report-divider"></div>

            <!-- Доход -->
            <div class="report-item">
                <div class="report-label">Всего доходов</div>
                <div class="report-value income-color" id="reportTotalIncome">0 ₽</div>
            </div>

            <!-- Расход -->
            <div class="report-item">
                <div class="report-label">Всего расходов</div>
                <div class="report-value expense-color" id="reportTotalExpense">0 ₽</div>
            </div>

            <div class="report-divider"></div>

            <!-- Выручка по формуле -->
            <div class="report-item">
                <div class="report-label">Выручка от доходов</div>
                <div class="report-value revenue-color" id="reportIncomeRevenue">0 ₽</div>
            </div>

            <div class="report-item">
                <div class="report-label">Выручка от расходов</div>
                <div class="report-value revenue-color" id="reportExpenseRevenue">0 ₽</div>
            </div>

            <div class="report-divider"></div>

            <!-- Общая выручка -->
            <div class="report-item" style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3);">
                <div class="report-label">Общая выручка</div>
                <div class="report-value revenue-color" id="reportTotalRevenue">0 ₽</div>
            </div>

            <div class="report-divider"></div>

            <!-- Статистика операций -->
            <div class="report-item">
                <div class="report-label">Количество операций</div>
                <div class="report-value text-white" id="reportTransactionCount">0</div>
            </div>

            <div class="report-item">
                <div class="report-label">Средняя сумма операции</div>
                <div class="report-value text-white" id="reportAverageAmount">0 ₽</div>
            </div>

            <!-- Кнопка закрытия -->
            <button onclick="closeReport()" class="w-full mt-6 px-4 py-3 bg-zinc-700 text-white hover:bg-zinc-600 active:scale-95 transition-all duration-200 rounded-2xl font-medium">
                Закрыть
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.colorScheme === 'light') {
            document.body.style.backgroundColor = '#ffffff';
            document.body.style.color = '#18181b';
            document.querySelector('.input-premium').style.color = '#18181b';
            document.querySelector('.input-premium').style.borderBottomColor = '#d4d4d8';
        }

        // ===== FIREBASE ИНИЦИАЛИЗАЦИЯ =====
        const firebaseConfig = {
            apiKey: "AIzaSyD0vf8kHH-VqQ-H9zC7r8K5M2L1N0P9Q8R",
            authDomain: "financesimple-db.firebaseapp.com",
            databaseURL: "https://financesimple-db-default-rtdb.firebaseio.com",
            projectId: "financesimple-db",
            storageBucket: "financesimple-db.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef1234567890"
        };

        try {
            const app = firebase.initializeApp(firebaseConfig);
            const db = firebase.database(app);

            // Получаем ID пользователя из Telegram
            const userId = tg.initDataUnsafe?.user?.id || Math.random().toString(36).substr(2, 9);
            const userName = tg.initDataUnsafe?.user?.first_name || 'User';
            const userRef = db.ref(`users/${userId}`);

            let balance = 0;
            let transactions = [];
            let isOnline = navigator.onLine;
            let isSyncing = false;

            const balanceEl = document.getElementById('balance');
            const amountEl = document.getElementById('amount');
            const historyEl = document.getElementById('history');
            const syncStatusEl = document.getElementById('syncStatus');
            const totalIncomeEl = document.getElementById('totalIncome');
            const totalExpenseEl = document.getElementById('totalExpense');
            const totalRevenueEl = document.getElementById('totalRevenue');
            const reportModal = document.getElementById('reportModal');

            const formatMoney = (num) => {
                return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(num);
            };

            const calculateStats = () => {
                let totalIncome = 0;
                let totalExpense = 0;

                transactions.forEach((t) => {
                    if (t.type === 'income') {
                        totalIncome += t.amount;
                    } else {
                        totalExpense += t.amount;
                    }
                });

                // Формула: Выручка = (доход * 0.07) + (расход * 0.025)
                const incomeRevenue = totalIncome * 0.07;
                const expenseRevenue = totalExpense * 0.025;
                const revenue = incomeRevenue + expenseRevenue;

                return { totalIncome, totalExpense, incomeRevenue, expenseRevenue, revenue };
            };

            const updateSyncStatus = (status) => {
                const statuses = {
                    syncing: { text: 'синхронизация...', class: 'syncing' },
                    synced: { text: 'синхронизировано', class: 'synced' },
                    offline: { text: 'автосохранение', class: '' },
                    error: { text: 'ошибка синхронизации', class: '' }
                };
                const s = statuses[status] || statuses.syncing;
                syncStatusEl.textContent = s.text;
                syncStatusEl.className = 'sync-indicator ' + s.class;
            };

            const updateUI = () => {
                balanceEl.textContent = formatMoney(balance);
                
                const stats = calculateStats();
                totalIncomeEl.textContent = formatMoney(stats.totalIncome);
                totalExpenseEl.textContent = formatMoney(stats.totalExpense);
                totalRevenueEl.textContent = formatMoney(stats.revenue);
                
                historyEl.innerHTML = '';
                
                if (transactions.length === 0) {
                    historyEl.innerHTML = '<p class="text-zinc-600 text-center text-sm font-light py-8">Нет операций</p>';
                } else {
                    transactions.slice().reverse().forEach((t) => {
                        const isIncome = t.type === 'income';
                        const colorClass = isIncome ? 'text-emerald-400' : 'text-rose-400';
                        const sign = isIncome ? '+' : '−';
                        
                        const div = document.createElement('div');
                        div.className = 'transaction-item flex justify-between items-center p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800/50';
                        
                        const date = new Date(t.date);
                        const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                        
                        div.innerHTML = `
                            <div class="flex flex-col">
                                <span class="text-zinc-300 font-light">${t.desc}</span>
                                <span class="text-zinc-600 text-xs">${timeStr}</span>
                            </div>
                            <span class="${colorClass} font-medium text-lg">${sign} ${formatMoney(t.amount)}</span>
                        `;
                        historyEl.appendChild(div);
                    });
                }

                // Сохраняем локально как бэкап
                localStorage.setItem('balance', balance);
                localStorage.setItem('transactions', JSON.stringify(transactions));
            };

            const saveToServer = async () => {
                if (!isOnline) {
                    updateSyncStatus('offline');
                    return;
                }

                isSyncing = true;
                updateSyncStatus('syncing');

                try {
                    const stats = calculateStats();
                    await userRef.set({
                        balance: balance,
                        transactions: transactions,
                        totalIncome: stats.totalIncome,
                        totalExpense: stats.totalExpense,
                        revenue: stats.revenue,
                        userName: userName,
                        lastUpdated: new Date().toISOString()
                    });
                    updateSyncStatus('synced');
                    isSyncing = false;
                } catch (error) {
                    console.error('Ошибка сохранения:', error);
                    updateSyncStatus('error');
                    isSyncing = false;
                }
            };

            const loadFromServer = () => {
                updateSyncStatus('syncing');
                userRef.once('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.transactions) {
                        balance = data.balance || 0;
                        transactions = data.transactions || [];
                        updateUI();
                        updateSyncStatus('synced');
                    } else {
                        // Если нет данных на сервере, загружаем локальные
                        balance = parseFloat(localStorage.getItem('balance')) || 0;
                        transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                        updateUI();
                        if (isOnline) {
                            saveToServer();
                        }
                    }
                }, (error) => {
                    console.error('Ошибка загрузки:', error);
                    balance = parseFloat(localStorage.getItem('balance')) || 0;
                    transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                    updateUI();
                    updateSyncStatus('offline');
                });
            };

            const addTransaction = (type) => {
                const amount = parseFloat(amountEl.value);
                if (!amount || amount <= 0) {
                    tg.HapticFeedback.notificationOccurred('error');
                    return;
                }

                if (type === 'income') {
                    balance += amount;
                } else {
                    balance -= amount;
                }

                transactions.push({
                    type: type,
                    amount: amount,
                    desc: type === 'income' ? 'Пополнение' : 'Списание',
                    date: new Date().toISOString()
                });

                amountEl.value = '';
                tg.HapticFeedback.impactOccurred('light');
                updateUI();
                saveToServer();
            };

            const resetAll = () => {
                if (transactions.length === 0) {
                    tg.HapticFeedback.notificationOccurred('warning');
                    return;
                }
                
                tg.HapticFeedback.notificationOccurred('warning');
                
                if (confirm('Обнулить баланс и всю историю?')) {
                    balance = 0;
                    transactions = [];
                    localStorage.removeItem('balance');
                    localStorage.removeItem('transactions');
                    tg.HapticFeedback.notificationOccurred('success');
                    updateUI();
                    saveToServer();
                } else {
                    tg.HapticFeedback.impactOccurred('soft');
                }
            };

            window.openReport = () => {
                const stats = calculateStats();
                const avgAmount = transactions.length > 0 ? transactions.reduce((sum, t) => sum + t.amount, 0) / transactions.length : 0;

                document.getElementById('reportBalance').textContent = formatMoney(balance);
                document.getElementById('reportTotalIncome').textContent = formatMoney(stats.totalIncome);
                document.getElementById('reportTotalExpense').textContent = formatMoney(stats.totalExpense);
                document.getElementById('reportIncomeRevenue').textContent = formatMoney(stats.incomeRevenue);
                document.getElementById('reportExpenseRevenue').textContent = formatMoney(stats.expenseRevenue);
                document.getElementById('reportTotalRevenue').textContent = formatMoney(stats.revenue);
                document.getElementById('reportTransactionCount').textContent = transactions.length;
                document.getElementById('reportAverageAmount').textContent = formatMoney(avgAmount);

                reportModal.classList.add('active');
                tg.HapticFeedback.impactOccurred('medium');
            };

            window.closeReport = () => {
                reportModal.classList.remove('active');
            };

            // Закрытие модального окна при клике на фон
            reportModal.addEventListener('click', (e) => {
                if (e.target === reportModal) {
                    closeReport();
                }
            });

            // Отслеживаем онлайн/оффлайн статус
            window.addEventListener('online', () => {
                isOnline = true;
                saveToServer();
            });

            window.addEventListener('offline', () => {
                isOnline = false;
                updateSyncStatus('offline');
            });

            amountEl.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addTransaction('expense');
                }
            });

            // Экспортируем функции в глобальный скоп
            window.addTransaction = addTransaction;
            window.resetAll = resetAll;

            // Загружаем данные при старте
            loadFromServer();

        } catch (error) {
            console.error('Ошибка инициализации Firebase:', error);
            // Fallback на локальное хранилище
            let balance = parseFloat(localStorage.getItem('balance')) || 0;
            let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

            const balanceEl = document.getElementById('balance');
            const amountEl = document.getElementById('amount');
            const historyEl = document.getElementById('history');
            const syncStatusEl = document.getElementById('syncStatus');
            const totalIncomeEl = document.getElementById('totalIncome');
            const totalExpenseEl = document.getElementById('totalExpense');
            const totalRevenueEl = document.getElementById('totalRevenue');
            const reportModal = document.getElementById('reportModal');

            syncStatusEl.textContent = 'локальное хранилище';
            syncStatusEl.style.color = '#f97316';

            const formatMoney = (num) => {
                return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(num);
            };

            const calculateStats = () => {
                let totalIncome = 0;
                let totalExpense = 0;

                transactions.forEach((t) => {
                    if (t.type === 'income') {
                        totalIncome += t.amount;
                    } else {
                        totalExpense += t.amount;
                    }
                });

                const incomeRevenue = totalIncome * 0.07;
                const expenseRevenue = totalExpense * 0.025;
                const revenue = incomeRevenue + expenseRevenue;
                return { totalIncome, totalExpense, incomeRevenue, expenseRevenue, revenue };
            };

            const updateUI = () => {
                balanceEl.textContent = formatMoney(balance);
                
                const stats = calculateStats();
                totalIncomeEl.textContent = formatMoney(stats.totalIncome);
                totalExpenseEl.textContent = formatMoney(stats.totalExpense);
                totalRevenueEl.textContent = formatMoney(stats.revenue);
                
                historyEl.innerHTML = '';
                
                if (transactions.length === 0) {
                    historyEl.innerHTML = '<p class="text-zinc-600 text-center text-sm font-light py-8">Нет операций</p>';
                } else {
                    transactions.slice().reverse().forEach((t) => {
                        const isIncome = t.type === 'income';
                        const colorClass = isIncome ? 'text-emerald-400' : 'text-rose-400';
                        const sign = isIncome ? '+' : '−';
                        
                        const div = document.createElement('div');
                        div.className = 'transaction-item flex justify-between items-center p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800/50';
                        
                        const date = new Date(t.date);
                        const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                        
                        div.innerHTML = `
                            <div class="flex flex-col">
                                <span class="text-zinc-300 font-light">${t.desc}</span>
                                <span class="text-zinc-600 text-xs">${timeStr}</span>
                            </div>
                            <span class="${colorClass} font-medium text-lg">${sign} ${formatMoney(t.amount)}</span>
                        `;
                        historyEl.appendChild(div);
                    });
                }

                localStorage.setItem('balance', balance);
                localStorage.setItem('transactions', JSON.stringify(transactions));
            };

            window.addTransaction = (type) => {
                const amount = parseFloat(amountEl.value);
                if (!amount || amount <= 0) {
                    tg.HapticFeedback.notificationOccurred('error');
                    return;
                }

                if (type === 'income') {
                    balance += amount;
                } else {
                    balance -= amount;
                }

                transactions.push({
                    type: type,
                    amount: amount,
                    desc: type === 'income' ? 'Пополнение' : 'Списание',
                    date: new Date().toISOString()
                });

                amountEl.value = '';
                tg.HapticFeedback.impactOccurred('light');
                updateUI();
            };

            window.resetAll = () => {
                if (transactions.length === 0) {
                    tg.HapticFeedback.notificationOccurred('warning');
                    return;
                }
                
                tg.HapticFeedback.notificationOccurred('warning');
                
                if (confirm('Обнулить баланс и всю историю?')) {
                    balance = 0;
                    transactions = [];
                    localStorage.removeItem('balance');
                    localStorage.removeItem('transactions');
                    tg.HapticFeedback.notificationOccurred('success');
                    updateUI();
                } else {
                    tg.HapticFeedback.impactOccurred('soft');
                }
            };

            window.openReport = () => {
                const stats = calculateStats();
                const avgAmount = transactions.length > 0 ? transactions.reduce((sum, t) => sum + t.amount, 0) / transactions.length : 0;

                document.getElementById('reportBalance').textContent = formatMoney(balance);
                document.getElementById('reportTotalIncome').textContent = formatMoney(stats.totalIncome);
                document.getElementById('reportTotalExpense').textContent = formatMoney(stats.totalExpense);
                document.getElementById('reportIncomeRevenue').textContent = formatMoney(stats.incomeRevenue);
                document.getElementById('reportExpenseRevenue').textContent = formatMoney(stats.expenseRevenue);
                document.getElementById('reportTotalRevenue').textContent = formatMoney(stats.revenue);
                document.getElementById('reportTransactionCount').textContent = transactions.length;
                document.getElementById('reportAverageAmount').textContent = formatMoney(avgAmount);

                reportModal.classList.add('active');
            };

            window.closeReport = () => {
                reportModal.classList.remove('active');
            };

            reportModal.addEventListener('click', (e) => {
                if (e.target === reportModal) {
                    closeReport();
                }
            });

            amountEl.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    window.addTransaction('expense');
                }
            });

            updateUI();
        }
    </script>
</body>
</html>
